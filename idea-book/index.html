<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scribble Sparkle</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    text-align: center;
    background: #fdf3e0;
    padding: 1rem;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 0.6rem;
    color: #7a4a2b;
  }
  #book {
    position: relative;
    width: min(95vw, 60rem);
    height: min(75vh, 40rem);
    background: linear-gradient(to right, #fffaf0 49.5%, #f4e6c8 50.5%);
    border: 0.3rem solid #7a4a2b;
    border-radius: 0.8rem;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    display: flex;
  }
  #book::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 0.8rem;
    margin-left: -0.4rem;
    background: linear-gradient(to right, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0));
  }
  .page {
    width: 50%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1.5rem;
  }
  #idea-text {
    font-size: 1.4rem;
    color: #333;
  }
  #flip-btn, #back-btn {
    margin-top: 1rem;
    font-size: 1.1rem;
    padding: 0.7rem 1.6rem;
    border-radius: 0.8rem;
    border: 2px solid #7a4a2b;
    background: #ffd97a;
    cursor: pointer;
  }
  #back-btn {
    margin-right: 0.6rem;
  }
  #draw-btn {
    margin-top: 0.7rem;
    font-size: 1.1rem;
    padding: 0.7rem 1.6rem;
    border-radius: 0.8rem;
    border: 2px solid #7a4a2b;
    background: #a3d9a5;
    cursor: pointer;
  }
  #draw-canvas {
    touch-action: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 0.5rem;
    background: transparent;
  }
  #color-btn {
    margin-top: 0.7rem;
    margin-left: 0.6rem;
    font-size: 1.1rem;
    padding: 0.7rem 1.6rem;
    border-radius: 0.8rem;
    border: 2px solid #7a4a2b;
    background: #ffb6d9;
    cursor: pointer;
  }
  #controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }
  #color-palette {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 0.5rem;
    background: #fff;
    border: 2px solid #7a4a2b;
    border-radius: 0.8rem;
    padding: 0.6rem;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    flex-wrap: wrap;
    gap: 0.5rem;
    width: min(16rem, 70vw);
  }
  .swatch {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    border: 2px solid #7a4a2b;
    cursor: pointer;
    padding: 0;
  }
  .swatch.active {
    border: 4px solid #333;
    box-shadow: 0 0 0 3px #ffd97a;
  }
  #color-indicator {
    display: inline-block;
    width: 1.4rem;
    height: 1.4rem;
    border-radius: 50%;
    border: 2px solid #333;
    vertical-align: middle;
    margin-left: 0.4rem;
  }
  #brush-size {
    margin-top: 0.7rem;
    margin-left: 0.6rem;
    width: 8rem;
  }
  #brush-label {
    font-size: 1rem;
    color: #7a4a2b;
    margin-left: 0.4rem;
  }
  #eraser-btn {
    margin-top: 0.7rem;
    margin-left: 0.6rem;
    font-size: 1.1rem;
    padding: 0.7rem 1.6rem;
    border-radius: 0.8rem;
    border: 2px solid #7a4a2b;
    background: #cfd8dc;
    cursor: pointer;
  }
  #eraser-size {
    margin-top: 0.7rem;
    margin-left: 0.6rem;
    width: 8rem;
  }
  #eraser-label {
    font-size: 1rem;
    color: #7a4a2b;
    margin-left: 0.4rem;
  }
  #fill-btn {
    margin-top: 0.7rem;
    margin-left: 0.6rem;
    font-size: 1.1rem;
    padding: 0.7rem 1.6rem;
    border-radius: 0.8rem;
    border: 2px solid #7a4a2b;
    background: #ffe066;
    cursor: pointer;
  }
  #pencil-btn {
    margin-top: 0.7rem;
    font-size: 1.1rem;
    padding: 0.7rem 1.6rem;
    border-radius: 0.8rem;
    border: 2px solid #7a4a2b;
    background: #a3d9a5;
    cursor: pointer;
  }
  .tool-btn.active {
    border: 4px solid #333;
    box-shadow: 0 0 0 3px #ffd97a;
  }
</style>
</head>
<body>
  <h1>Scribble Sparkle</h1>
  <div id="book">
    <div class="page"></div>
    <div class="page"><div id="idea-text">Flip the page to get an idea!</div></div>
    <canvas id="draw-canvas"></canvas>
  </div>
  <div>
    <button id="back-btn" onclick="flipBack()">⬅️ Back a Page</button>
    <button id="flip-btn" onclick="flipPage()">Flip the Page</button>
  </div>
  <div id="controls" style="position: relative;">
    <button id="color-btn" onclick="toggleColorPicker()">🎨 Color</button>
    <span id="color-indicator"></span>
    <div id="color-palette"></div>
    <input type="range" id="brush-size" min="1" max="30" value="4" oninput="updateBrushSize()">
    <span id="brush-label">4</span>
    <button id="pencil-btn" class="tool-btn" onclick="selectTool('draw')">✏️ Draw</button>
    <button id="eraser-btn" class="tool-btn" onclick="selectTool('eraser')">🧹 Eraser</button>
    <input type="range" id="eraser-size" min="1" max="60" value="20" oninput="updateEraserSize()">
    <span id="eraser-label">20</span>
    <button id="fill-btn" class="tool-btn" onclick="selectTool('fill')">🪣 Fill</button>
  </div>
  <script>
    const ideas = [
      "Draw a dragon who's scared of butterflies",
      "Draw a dragon riding inside a carriage",
      "Draw a dragon sailing a ship across the clouds",
      "Draw yourself as a dragon",
      "Draw yourself as any animal you choose",
      "Draw a unicorn riding a bicycle",
      "Draw a fish riding a bicycle",
      "Draw a wizard whose pet is a giant spider",
      "Draw a castle floating on a giant turtle's back",
      "Draw a lion wearing a king's crown and cape",
      "Draw a monster who's afraid of the dark",
      "Draw an owl flying a hot air balloon",
      "Draw a phoenix made of rainbow fire",
      "Draw a wolf who howls at a purple moon",
      "Draw a giant elephant carrying a floating city on its back",
      "Draw a penguin wizard casting a snow spell",
      "Draw a griffin racing a rocket ship",
      "Draw a bear knight guarding a candy castle",
      "Draw a mermaid riding a seahorse through the stars",
      "Draw a dragon who collects shooting stars",
      "Draw a rabbit pilot flying a paper airplane",
      "Draw a snake curled around a treasure chest of gems",
      "Draw a tiger who paints pictures with its tail",
      "Draw a unicorn with wings made of butterflies"
    ];
    const rainbow = ['#e63946', '#f3722c', '#d4a017', '#43aa8b', '#277da1', '#7209b7'];
    function showIdea(idea) {
      const textEl = document.getElementById('idea-text');
      textEl.innerHTML = '';
      idea.split('').forEach((letter, i) => {
        const span = document.createElement('span');
        span.textContent = letter;
        span.style.color = rainbow[i % rainbow.length];
        textEl.appendChild(span);
      });
    }
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    let deck = JSON.parse(localStorage.getItem('deck') || 'null');
    if (!deck || !deck.length) deck = shuffle(ideas);
    let history = JSON.parse(localStorage.getItem('history') || '[]');
    let historyIndex = parseInt(localStorage.getItem('historyIndex') || '-1', 10);
    function saveHistory() {
      localStorage.setItem('history', JSON.stringify(history));
      localStorage.setItem('historyIndex', String(historyIndex));
    }
    let drawings = JSON.parse(localStorage.getItem('drawings') || '{}');
    function saveCurrentDrawing() {
      if (historyIndex < 0) return;
      drawings[historyIndex] = canvas.toDataURL();
      localStorage.setItem('drawings', JSON.stringify(drawings));
    }
    function loadDrawing(idx) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const saved = drawings[idx];
      if (!saved) return;
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = saved;
    }
    function flipPage() {
      saveCurrentDrawing();
      if (historyIndex < history.length - 1) {
        historyIndex++;
      } else {
        if (!deck.length) deck = shuffle(ideas);
        const idea = deck.pop();
        localStorage.setItem('deck', JSON.stringify(deck));
        history.push(idea);
        historyIndex = history.length - 1;
      }
      showIdea(history[historyIndex]);
      loadDrawing(historyIndex);
      saveHistory();
    }
    function flipBack() {
      if (historyIndex > 0) {
        saveCurrentDrawing();
        historyIndex--;
        showIdea(history[historyIndex]);
        loadDrawing(historyIndex);
        saveHistory();
      }
    }
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let currentColor = '#333333';
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.strokeStyle = currentColor;

    if (historyIndex >= 0 && history[historyIndex]) {
      showIdea(history[historyIndex]);
      loadDrawing(historyIndex);
    }

    const colors = ['#e63946', '#f3722c', '#f9c74f', '#43aa8b', '#277da1', '#7209b7', '#ffffff', '#7a4a2b'];
    const palette = document.getElementById('color-palette');
    const colorIndicator = document.getElementById('color-indicator');
    colorIndicator.style.background = currentColor;
    colors.forEach(color => {
      const swatch = document.createElement('button');
      swatch.className = 'swatch';
      swatch.style.background = color;
      if (color === currentColor) swatch.classList.add('active');
      swatch.onclick = () => {
        currentColor = color;
        ctx.strokeStyle = currentColor;
        colorIndicator.style.background = currentColor;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        palette.style.display = 'none';
      };
      palette.appendChild(swatch);
    });
    function toggleColorPicker() {
      palette.style.display = palette.style.display === 'flex' ? 'none' : 'flex';
    }
    function updateBrushSize() {
      const size = document.getElementById('brush-size').value;
      document.getElementById('brush-label').textContent = size;
      if (currentTool === 'draw') ctx.lineWidth = size;
    }
    let currentTool = 'draw';
    function selectTool(tool) {
      currentTool = tool;
      document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
      if (tool === 'draw') {
        document.getElementById('pencil-btn').classList.add('active');
        ctx.globalCompositeOperation = 'source-over';
        ctx.lineWidth = document.getElementById('brush-size').value;
      } else if (tool === 'eraser') {
        document.getElementById('eraser-btn').classList.add('active');
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = document.getElementById('eraser-size').value;
      } else if (tool === 'fill') {
        document.getElementById('fill-btn').classList.add('active');
      }
    }
    selectTool('draw');
    function updateEraserSize() {
      const size = document.getElementById('eraser-size').value;
      document.getElementById('eraser-label').textContent = size;
      if (currentTool === 'eraser') ctx.lineWidth = size;
    }
    function hexToRgb(hex) {
      const n = parseInt(hex.replace('#', ''), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }
    function floodFill(x, y, color) {
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = img.data;
      const w = canvas.width, h = canvas.height;
      const start = (y * w + x) * 4;
      const startR = data[start], startG = data[start + 1], startB = data[start + 2], startA = data[start + 3];
      const fill = hexToRgb(color);
      if (startR === fill.r && startG === fill.g && startB === fill.b && startA === 255) return;
      const matches = pos =>
        Math.abs(data[pos] - startR) < 30 &&
        Math.abs(data[pos + 1] - startG) < 30 &&
        Math.abs(data[pos + 2] - startB) < 30 &&
        Math.abs(data[pos + 3] - startA) < 30;
      const stack = [[x, y]];
      while (stack.length) {
        const [px, py] = stack.pop();
        if (px < 0 || px >= w || py < 0 || py >= h) continue;
        const pos = (py * w + px) * 4;
        if (!matches(pos)) continue;
        data[pos] = fill.r;
        data[pos + 1] = fill.g;
        data[pos + 2] = fill.b;
        data[pos + 3] = 255;
        stack.push([px + 1, py], [px - 1, py], [px, py + 1], [px, py - 1]);
      }
      ctx.putImageData(img, 0, 0);
    }
    function pointFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX - rect.left, y: p.clientY - rect.top };
    }
    function startDraw(e) {
      const p = pointFromEvent(e);
      if (currentTool === 'fill') {
        floodFill(Math.floor(p.x), Math.floor(p.y), currentColor);
        e.preventDefault();
        return;
      }
      drawing = true;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      e.preventDefault();
    }
    function moveDraw(e) {
      if (!drawing) return;
      const p = pointFromEvent(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      e.preventDefault();
    }
    function stopDraw() {
      drawing = false;
    }
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', moveDraw);
    canvas.addEventListener('touchend', stopDraw);
  </script>
</body>
</html>
